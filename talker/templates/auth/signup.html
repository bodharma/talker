{% extends "base.html" %}
{% block title %}Talker — Sign Up{% endblock %}
{% block content %}
<div style="max-width:400px;margin:4rem auto;">
    <h1>Create Account</h1>
    {% if error %}
    <div style="background:var(--danger);color:white;padding:0.75rem;border-radius:6px;margin-bottom:1rem;">
        {{ error }}
    </div>
    {% endif %}
    <form method="post" action="/auth/signup">
        <input type="hidden" name="invite_token" value="{{ invite_token }}">
        <div style="margin-bottom:1rem;">
            <label style="font-weight:600;display:block;margin-bottom:0.25rem;">Name</label>
            <input type="text" name="name" required
                   style="width:100%;padding:0.5rem;border:1px solid var(--border);border-radius:6px;">
        </div>
        <div style="margin-bottom:1rem;">
            <label style="font-weight:600;display:block;margin-bottom:0.25rem;">Email</label>
            <input type="email" name="email" required
                   style="width:100%;padding:0.5rem;border:1px solid var(--border);border-radius:6px;">
        </div>
        <div style="margin-bottom:1.5rem;">
            <label style="font-weight:600;display:block;margin-bottom:0.25rem;">Password</label>
            <input type="password" name="password" required minlength="8"
                   style="width:100%;padding:0.5rem;border:1px solid var(--border);border-radius:6px;">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Create Account</button>
    </form>
    <p style="text-align:center;margin-top:1rem;">
        Already have an account? <a href="/auth/login">Sign in</a>
    </p>
</div>
{% endblock %}
