{% extends "base.html" %}
{% block title %}Talker — Admin Login{% endblock %}
{% block content %}
<div style="max-width:400px;margin:4rem auto;">
    <h1>Admin Login</h1>
    {% if error %}
    <div style="background:var(--danger);color:white;padding:0.75rem;border-radius:6px;margin-bottom:1rem;">
        {{ error }}
    </div>
    {% endif %}
    <form method="post" action="/admin/login">
        <div style="margin-bottom:1rem;">
            <label style="font-weight:600;display:block;margin-bottom:0.25rem;">Username</label>
            <input type="text" name="username" required
                   style="width:100%;padding:0.5rem;border:1px solid var(--border);border-radius:6px;">
        </div>
        <div style="margin-bottom:1.5rem;">
            <label style="font-weight:600;display:block;margin-bottom:0.25rem;">Password</label>
            <input type="password" name="password" required
                   style="width:100%;padding:0.5rem;border:1px solid var(--border);border-radius:6px;">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Sign In</button>
    </form>
</div>
{% endblock %}
